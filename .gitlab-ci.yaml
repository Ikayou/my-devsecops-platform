# GitLab CI/CD Pipeline für Terraform-Projekte
include:
  - template: Terraform/Base.latest.gitlab-ci.yml

stages:
  - validate
  - test

fmt:
  extends: .terraform:fmt

validate:
  extends: .terraform:validate

# Terraform-Plan-Job, der den Plan erstellt, aber nicht anwendet
plan:
  extends: .terraform:build