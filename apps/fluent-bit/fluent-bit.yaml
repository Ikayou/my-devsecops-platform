apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit
  namespace: argocd
spec:
  project: default
  source:
    chart: fluent-bit
    repoURL: https://fluent.github.io/helm-charts 
    targetRevision: 0.47.0 
    helm:
    
      values: |
        config:
          outputs: |
            [OUTPUT]
                Name  stdout
                Match *  
  destination:
    server: https://kubernetes.default.svc
    namespace: logging # Logging namespace deployment
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # wenn Namespace nicht existiert, wird er erstellt