apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-web-app  
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ikayou/my-devsecops-platform.git
    targetRevision: HEAD
    path: apps/my-app  
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true