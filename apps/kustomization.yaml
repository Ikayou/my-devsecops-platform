# apps/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Hier werden die Unterverzeichnisse aufgelistet, die jeweils eine eigene kustomization.yaml haben.
resources:
  - keycloak/overlays/dev
  - loki/base/
  - falco/base
  - prometheus/base/
  - argo-workflows/base/
  - trivy/base
  - fluent-bit/base

# Gemeinsame Labels für die gesamte Plattform
commonLabels:
  platform: devsecops-project
  variant: development