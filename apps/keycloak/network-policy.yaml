# apps/keycloak/network-policy.yaml
apiVersion: networking.k8s.io/1.1
kind: NetworkPolicy
metadata:
  name: keycloak-policy
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes:
  - Ingress
  ingress:
  # Erlaubt nur Datenverkehr von Ingress-Controllern
  # Ermöglicht eine sichere Kommunikation innerhalb des Clusters
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx