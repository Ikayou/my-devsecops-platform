apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: keycloak
    targetRevision: 22.1.0
    helm:
      values: |
        auth:
          adminUser: admin
          adminPassword: "password123"

        image:
          registry: docker.io
          repository: bitnamilegacy/keycloak
          tag: "26"

        postgresql:
          auth:
            password: "password123" 
            postgresPassword: "password123"
          image:
            registry: docker.io
            repository: bitnami/postgresql
            tag: "16.3.0-debian-12"

        proxy: edge
        httpRelativePath: /
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true