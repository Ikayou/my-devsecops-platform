apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: keycloak
    targetRevision: 22.1.0
    helm:
      values: |
        auth:
          adminUser: admin
          adminPassword: "password123"

        image:
          registry: docker.io
          repository: bitnamilegacy/keycloak
          tag: "25.0.2-debian-12-r2"

        postgresql:
          enabled: true
          externalHostname: "keycloak-postgresql"
          auth:
            existingSecret: keycloak-postgresql-secret
            secretKeys:
              adminPasswordKey: postgres-password
              userPasswordKey: password
          image:
            registry: docker.io
            repository: bitnamilegacy/postgresql
            tag: "16.4.0-debian-12-r28"

        proxy: edge
        httpRelativePath: /

  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true