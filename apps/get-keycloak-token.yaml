apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: get-keycloak-token
  namespace: argo
spec:
  entrypoint: main
  templates:
    - name: main
      container:
        image: curlimages/curl:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Keycloak Token holen"
            
            TOKEN=$(curl -s -X POST \
              "http://keycloak.keycloak.svc.cluster.local/realms/devsecops/protocol/openid-connect/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=client_credentials" \
              -d "client_id=$CLIENT_ID" \
              -d "client_secret=$CLIENT_SECRET" | jq -r '.access_token')
            
            echo "Token erfolgreich abgerufen!"
            echo "Token: ${TOKEN:0:20}..." # Nur die ersten 20 Zeichen des Tokens anzeigen
        env:
          - name: CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: keycloak-argo-creds
                key: client-id
          - name: CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: keycloak-argo-creds
                key: client-secret