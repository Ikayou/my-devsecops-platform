apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.0.0  
    helm:
      values: |
        driver:
          enabled: true
          kind: modern_ebpf
        falco:
          http_output:
            enabled: true
            url: "http://falco-falcosidekick:2801/"
        falcosidekick:
          enabled: true
          metrics:
            enabled: true
          webui:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true