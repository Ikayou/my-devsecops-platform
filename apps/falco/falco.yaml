apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.0.0
    helm:
      values: |
        # -- Treiber-Konfiguration: Modern eBPF für WSL2/Kind Stabilität
        driver:
          kind: modern_ebpf
          enabled: false

        # -- Falcoctl: Automatisierung von Sicherheitsregeln
        falcoctl:
          artifact:
            install:
              enabled: true
            follow:
              enabled: true

        # -- Hauptkonfiguration und Event-Quellen
        falco:
          privileged: true
          # Aktiviert die Überwachung von Systemaufrufen (behebt den vorherigen Fehler)
          event_sources:
            syscall:
              enabled: true
          
          json_output: true
          stdout_output:
            enabled: true
          http_output:
            enabled: true
            url: "http://falco-falcosidekick:2801/"

        # -- Falcosidekick für Dashboard und Benachrichtigungen
        falcosidekick:
          enabled: true
          webui:
            enabled: true
  
  # -- Ziel-Konfiguration (Muss auf der gleichen Ebene wie 'source' stehen!)
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true