apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 3.0.0
    helm:
      values: |
        # -- Treiber-Konfiguration: Wir MÜSSEN 'modern_ebpf' erzwingen
        driver:
          enabled: true
          kind: modern_ebpf

        # -- WICHTIG: Kernel-Modul explizit deaktivieren, damit er nicht danach sucht
        falco:
          privileged: true
          # Hier stellen wir sicher, dass er die syscall-Quelle nutzt
          event_sources:
            syscall:
              enabled: true
          
          # Modern eBPF spezifische Einstellungen
          ebpf:
            enabled: true # In Version 0.34.0 oft nötig als Schalter

        # -- Die restlichen Einstellungen bleiben gleich
        falcoctl:
          artifact:
            install:
              enabled: true
            follow:
              enabled: false

        falcosidekick:
          enabled: true
          webui:
            enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: falco

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true