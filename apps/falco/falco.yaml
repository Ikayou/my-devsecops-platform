apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.0.0
    helm:
      values: |
        # -- Treiber-Konfiguration
        driver:
          kind: modern_ebpf
          enabled: false

        # -- Falcoctl: Regeln laden
        falcoctl:
          artifact:
            install:
              enabled: true
            follow:
              enabled: false

        # -- Hauptkonfiguration (Korrektur für "Must enable at least one event source")
        falco:
          privileged: true
          
          # 1. Erzwinge die syscall-Quelle auf Service-Ebene
          services:
            - name: syscall
              enabled: true
          
          # 2. Explizite Aktivierung der modern_ebpf Engine
          engine:
            kind: modern_ebpf
          
          # 3. Standard-Einstellungen beibehalten
          json_output: true
          stdout_output:
            enabled: true
          http_output:
            enabled: true
            url: "http://falco-falcosidekick:2801/"

        # -- Falcosidekick
        falcosidekick:
          enabled: true
          webui:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true