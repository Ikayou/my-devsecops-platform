apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.0.0
    helm:
      values: |
        # -- Treiber-Einstellungen für WSL2
        driver:
          kind: modern_ebpf
          enabled: false

        # -- Falcoctl: Regeln erfolgreich installiert
        falcoctl:
          artifact:
            install:
              enabled: true
            follow:
              enabled: true

        # -- Diese Sektion erzwingt die Aktivierung der System-Events
        # Behebt "Must enable at least one event source"
        falco:
          # Ermöglicht Falco den Zugriff auf Kernel-Datenstrukturen
          privileged: true
          
          # Manuelle Aktivierung der Modern-eBPF Engine
          # In Version 4.0.0 ist dies oft der entscheidende Schalter
          ebpf:
            enabled: true
          
          # Direkte Konfiguration der Ereignisquellen
          tty: true
          json_output: true
          stdout_output:
            enabled: true
          http_output:
            enabled: true
            url: "http://falco-falcosidekick:2801/"

        # -- Sidekick Integration
        falcosidekick:
          enabled: true
          webui:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true