apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.0.0
    helm:
      values: |
        driver:
          kind: auto
          enabled: true
          loader:
            enabled: true

        falcoctl:
          artifact:
            install:
              enabled: true
            follow:
              enabled: true   

        falco:
          privileged: false   
          json_output: true
          stdout_output:
            enabled: true
          http_output:
            enabled: true
            url: "http://{{ .Release.Name }}-falcosidekick:2801/" 

        falcosidekick:
          enabled: true
          webui:
            enabled: true
            user: "admin:changeme"  

  destination:
    server: https://kubernetes.default.svc
    namespace: falco

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true