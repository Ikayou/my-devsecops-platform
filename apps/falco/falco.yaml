apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.0.0
    helm:
      values: |
        # -- Treiber: Modern eBPF (Empfohlen für WSL2)
        driver:
          kind: modern_ebpf
          enabled: false

        # -- Erstmalige Installation der Regeln (Follow deaktiviert für Stabilität)
        falcoctl:
          artifact:
            install:
              enabled: true
            follow:
              enabled: false

        # -- Hauptkonfiguration
        falco:
          privileged: true
          # Aktiviert die Ereignisquelle (Wichtig!)
          event_sources:
            syscall:
              enabled: true
          
          json_output: true
          stdout_output:
            enabled: true
          http_output:
            enabled: true
            url: "http://falco-falcosidekick:2801/"

        # -- Sidekick
        falcosidekick:
          enabled: true
          webui:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true