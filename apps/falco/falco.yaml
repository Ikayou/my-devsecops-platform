apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 3.0.0
    helm:
      values: |
        # -- Treiber-Einstellungen
        driver:
          enabled: true
          kind: modern_ebpf # WSL2 benötigt modern_ebpf

        # -- Event-Quellen für Version 0.34.0 erzwingen
        # In dieser Version muss syscall oft auf der obersten Ebene stehen
        syscall:
          enabled: true

        # -- Hauptkonfiguration
        falco:
          privileged: true
          
          # Erzwungene Engine-Einstellung für ältere Versionen
          # Dies behebt "Must enable at least one event source"
          engine:
            kind: modern_ebpf
          
          # Sicherstellen, dass syscall auch hier aktiv ist
          event_sources:
            syscall:
              enabled: true

          json_output: true
          stdout_output:
            enabled: true
          http_output:
            enabled: true
            url: "http://falco-falcosidekick:2801/"

        # -- Falcoctl: Regeln laden
        falcoctl:
          artifact:
            install:
              enabled: true
            follow:
              enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: falco

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true