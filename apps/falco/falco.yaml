apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.0.0
    helm:
      values: |
        driver:
          kind: modern_ebpf
          enabled: true
          loader:
            enabled: false

        falco:
          privileged: true
          tty: true
          json_output: true
          stdout_output:
            enabled: true
            syscall_event_drops:
              actions:
                - log
          http_output:
            enabled: true
            url: "http://falco-falcosidekick:2801/"

        falcosidekick:
          enabled: true
          webui:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true