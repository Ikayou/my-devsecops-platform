apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 3.0.0
    helm:
      values: |
        # -- Global: Treiber-Einstellungen
        # Wir deaktivieren den Driver-Loader komplett, da Modern eBPF ihn nicht benötigt.
        driver:
          enabled: false     # Erzwingt das Deaktivieren des fehlerhaften Init-Containers
          kind: modern_ebpf

        # -- Falcoctl: Regel-Management
        falcoctl:
          artifact:
            install:
              enabled: true
            follow:
              enabled: false

        # -- Haupt-Konfiguration
        falco:
          privileged: true
          # Aktiviert die modern_ebpf Engine direkt in der Falco-Konfiguration
          ebpf:
            enabled: true
          
          # Sicherstellen, dass syscalls überwacht werden
          event_sources:
            syscall:
              enabled: true

          json_output: true
          stdout_output:
            enabled: true
          http_output:
            enabled: true
            url: "http://falco-falcosidekick:2801/"

        # -- Sidekick Integration
        falcosidekick:
          enabled: true
          webui:
            enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: falco

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true