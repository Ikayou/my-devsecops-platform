apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.0.0  
    helm:
      values: |
        driver:
          kind: ebpf 
      
        ebpf:
          enabled: true
        
        falco:
          privileged: true 
          tty: true
          can_mount_host_fs: true
          syscall_buf_size_preset: 2
          json_output: true
          stdout_output:
            enabled: true

          http_output:
            enabled: true
            url: "http://falco-falcosidekick:2801/"
        mounts:
          hostRoot: true

        falcosidekick:
          enabled: true
          webui:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true