apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.0.0
    helm:
      values: |
        # -- Treiber-Einstellungen
        driver:
          kind: modern_ebpf
          enabled: false

        # -- Falcoctl Konfiguration (Fix für artifact-follow Absturz)
        falcoctl:
          artifact:
            install:
              enabled: true
            follow:
              enabled: true
          config:
            artifact:
              install:
                # Verhindert Konflikte bei der Pfad-Auflösung
                resolve_deps: false

        # -- Haupt-Engine Konfiguration
        falco:
          privileged: true
          # Erzwingt die modern_ebpf Engine auf Software-Ebene
          ebpf:
            enabled: true
          
          # Sicherstellen, dass die System-Events aktiv sind
          event_sources:
            syscall:
              enabled: true

          json_output: true
          stdout_output:
            enabled: true
          http_output:
            enabled: true
            url: "http://falco-falcosidekick:2801/"

        # -- Mount-Einstellungen für WSL2/Kind
        # Dies stellt sicher, dass Falco Zugriff auf die notwendigen Host-Pfade hat
        mounts:
          hostRoot: true

        # -- Sidekick Integration
        falcosidekick:
          enabled: true
          webui:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true