apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.10.0
    helm:
      values: |
        # -- Treiber-Einstellungen
        driver:
          enabled: true
          kind: modern_ebpf # Modern eBPF benötigt keinen Init-Container (driver-loader)

        # -- Falcoctl: Automatische Regel-Aktualisierung
        falcoctl:
          artifact:
            install:
              enabled: true
            follow:
              enabled: true # Kann in v4.5.0 wieder aktiviert werden

        # -- Haupt-Konfiguration
        falco:
          privileged: true
          
          # In v4.5.0 wird die syscall-Quelle automatisch durch 'modern_ebpf' aktiviert.
          # Wir stellen sicher, dass die Ausgabe korrekt konfiguriert ist.
          json_output: true
          stdout_output:
            enabled: true
          http_output:
            enabled: true
            url: "http://falco-falcosidekick:2801/"

        # -- Falcosidekick
        falcosidekick:
          enabled: true
          webui:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true