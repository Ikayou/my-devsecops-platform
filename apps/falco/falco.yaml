apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.0.0
    helm:
      values: |
        # -- Treiber-Konfiguration
        driver:
          kind: modern_ebpf
          enabled: false # Nicht benötigt für Modern eBPF

        # -- Falcoctl: Automatisierung von Rules
        falcoctl:
          artifact:
            install:
              enabled: true
            follow:
              enabled: true

        # -- Hauptkonfiguration von Falco
        falco:
          privileged: true
          
          # NEU: Aktiviert die Ereignisquellen für Systemaufrufe
          # Erforderlich für Modern eBPF, um zu wissen, was überwacht werden soll.
          event_sources:
            syscall:
              enabled: true

          json_output: true
          stdout_output:
            enabled: true
          http_output:
            enabled: true
            url: "http://falco-falcosidekick:2801/"

        # -- Falcosidekick
        falcosidekick:
          enabled: true
          webui:
            enabled: true