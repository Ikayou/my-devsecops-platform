apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ikayou/my-devsecops-platform.git
    targetRevision: HEAD
    path: apps           # Alle Apps Durchführung
    directory:
      #recurse: true      
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true  
      - RespectIgnoreDifferences=true
      - Validate=false