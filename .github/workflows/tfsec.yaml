name: tfsec-check
on: [push, pull_request]

jobs:
  tfsec:
    name: tfsec scanner
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform # Pfad zu dem Terraform-Code