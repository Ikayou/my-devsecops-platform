apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: keycloak-daily-audit
  namespace: argo
spec:
  schedule: "0 0 * * *"  # Jeden Tag um Mitternacht (UTC)
  timezone: "Europe/Berlin" # Zeitzone anpassen, falls nötig
  concurrencyPolicy: "Replace"
  startingDeadlineSeconds: 600
  workflowSpec:
    workflowTemplateRef:
      name: keycloak-audit-templates # Bereits erstelltes Template aufrufen