apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: trivy-security-scanner
spec:
  templates:
  - name: scan-image
    script:
      image: python:3.9-slim
      command: [python]
      env:
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: slack-creds
            key: webhook-url
      - name: JIRA_URL
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: url
      - name: JIRA_USER
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: user
      - name: JIRA_TOKEN
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: token
      - name: JIRA_PROJECT
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: project
      source: |
        import subprocess
        import sys
        import os
        import json
        import urllib.request
        import tarfile

        print("--- Start der finalen Verarbeitung ---")
        
        def install_trivy():
            trivy_path = "/usr/local/bin/trivy"
            if not os.path.exists(trivy_path):
                print("Installiere Trivy...")
                url = "https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-ARM64.tar.gz"
                urllib.request.urlretrieve(url, "/tmp/trivy.tar.gz")
                with tarfile.open("/tmp/trivy.tar.gz", "r:gz") as tar:
                    tar.extract("trivy", path="/usr/local/bin")
                os.chmod(trivy_path, 0o755)
                print("Trivy erfolgreich installiert.")

        try:
            install_trivy()
            subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "-q"])
        except Exception as e:
            print(f"Fehler bei der Vorbereitung: {e}")
            sys.exit(1)

        import requests
        from requests.auth import HTTPBasicAuth

        # Funktionen für Slack und Jira
        def send_slack_message(cve_id, pkg, severity):
            slack_url = os.getenv("SLACK_WEBHOOK_URL")
            if not slack_url:
                print("Warnung: SLACK_WEBHOOK_URL nicht gesetzt.")
                return
            
            message = f" *Neue Schwachstelle gefunden*\n*ID:* {cve_id}\n*Paket:* {pkg}\n*Schweregrad:* {severity}"
            res = requests.post(slack_url, json={"text": message})
            if res.status_code != 200:
                print(f"Slack Fehler: {res.status_code}")
            else:
                print(f"Slack-Nachricht für {cve_id} gesendet.")

        def create_jira_issue(v):
            jira_url = os.getenv("JIRA_URL")
            user = os.getenv("JIRA_USER")
            token = os.getenv("JIRA_TOKEN")
            project_key = os.getenv("JIRA_PROJECT")
            
            cve_id = v.get('VulnerabilityID', 'Unknown')
            pkg = v.get('PkgName', 'Unknown')
            title = v.get('Title', 'Keine Zusammenfassung')
            description = v.get('Description', 'Keine Details verfügbar')
            severity = v.get('Severity', 'UNKNOWN')
            url = v.get('PrimaryURL', '')
            
            endpoint = f"{jira_url}/rest/api/3/issue"
            auth = HTTPBasicAuth(user, token)
            
            # Jira-Beschreibung mit strukturierter Formatierung
            full_description = (
                f"Details zur Schwachstelle\n"
                f"ID: {cve_id}\n"
                f"Paket: {pkg}\n"
                f"Schweregrad: {severity}\n"
                f"Fix verfügbar in: {v.get('FixedVersion', 'N/A')}\n\n"
                f"Zusammenfassung\n{title}\n\n"
                f"Beschreibung\n{description}\n\n"
                f"Referenz\n{url}"
            )
            
            payload = {
                "fields": {
                    "project": {"key": project_key},
                    "summary": f"Sicherheit: {cve_id} in {pkg}",
                    "description": {
                        "type": "doc", "version": 1,
                        "content": [{"type": "paragraph", "content": [{"type": "text", "text": full_description}]}]
                    },
                    "issuetype": {"name": "Task"}
                }
            }
            
            res = requests.post(endpoint, json=payload, auth=auth)
            if res.status_code == 201:
                print(f"Erfolg: Ticket für {cve_id} erstellt.")
                send_slack_message(cve_id, pkg, severity)
            else:
                print(f"Jira Fehler ({res.status_code}): {res.text}")

        try:
            # Hier kann man das zu scannende Image anpassen
            target_image = "quay.io/keycloak/keycloak:latest"
            print(f"Starte Scan für: {target_image}")
            
            cmd = ["/usr/local/bin/trivy", "image", "--severity", "HIGH,CRITICAL", "--format", "json", target_image]
            result = subprocess.run(cmd, capture_output=True, text=True)
            
            report = json.loads(result.stdout)
            if "Results" in report:
                for r in report["Results"]:
                    if "Vulnerabilities" in r:
                        vulns = r["Vulnerabilities"]
                        print(f"{len(vulns)} Schwachstellen gefunden.")
                        for v in vulns:
                            create_jira_issue(v)
            else:
                print("Keine Ergebnisse vom Scan erhalten.")
        except Exception as e:
            print(f"Unerwarteter Fehler: {e}")