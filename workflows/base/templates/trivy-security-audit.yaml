apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: trivy-security-scanner
spec:
  templates:
  - name: security-scan-pipeline
    steps:
    - - name: scan-selected-images
        template: scan-image
        arguments:
          parameters:
          - name: target_image
            value: "{{item}}"
        # Hier können weitere Images hinzugefügt werden, die regelmäßig gescannt werden sollen
        withItems:
          - "docker.io/bitnamilegacy/keycloak:26"
          - "docker.io/bitnamilegacy/postgresql:16"
          - "nginx:1.30.0"
          - "quay.io/argoproj/argocd:v3.3.8"
  - name: scan-image
    script:
      image: python:3.9-slim
      command: [python]
      env:
      - name: TARGET_IMAGE  # Umgebungsvariable für das zu scannende Image
        value: "{{inputs.parameters.target_image}}"
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: slack-creds
            key: webhook-url
      - name: JIRA_URL
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: url
      - name: JIRA_USER
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: user
      - name: JIRA_TOKEN
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: token
      - name: JIRA_PROJECT
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: project
      source: |
        import subprocess, sys, os, json, urllib.request, tarfile

        def install_trivy():
            trivy_path = "/usr/local/bin/trivy"
            if not os.path.exists(trivy_path):
                url = "https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-ARM64.tar.gz"
                urllib.request.urlretrieve(url, "/tmp/trivy.tar.gz")
                with tarfile.open("/tmp/trivy.tar.gz", "r:gz") as tar:
                    tar.extract("trivy", path="/usr/local/bin")
                os.chmod(trivy_path, 0o755)

        try:
            install_trivy()
            subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "-q"])
        except Exception as e:
            print(f"Fehler: {e}"); sys.exit(1)

        import requests
        from requests.auth import HTTPBasicAuth

        def send_slack_message(cve_id, pkg, severity, img):
            slack_url = os.getenv("SLACK_WEBHOOK_URL")
            if not slack_url: return
            msg = f" *Schwachstelle in {img}*\n*ID:* {cve_id}\n*Paket:* {pkg}\n*Grad:* {severity}"
            requests.post(slack_url, json={"text": msg})

        def create_jira_issue(v, img):
            jira_url, user, token, project_key = os.getenv("JIRA_URL"), os.getenv("JIRA_USER"), os.getenv("JIRA_TOKEN"), os.getenv("JIRA_PROJECT")
            cve_id, pkg = v.get('VulnerabilityID', 'Unknown'), v.get('PkgName', 'Unknown')
            
            full_description = (
                f"DETAILS ZUR SCHWACHSTELLE\n"
                f"Image: {img}\n"
                f"ID: {cve_id}\n"
                f"Paket: {pkg}\n"
                f"Fix: {v.get('FixedVersion', 'N/A')}\n\n"
                f"BESCHREIBUNG\n{v.get('Description', 'N/A')}"
            )
            
            payload = {
                "fields": {
                    "project": {"key": project_key},
                    
                    "summary": f"Sicherheit ({img}): {cve_id}",
                    "description": {
                        "type": "doc", "version": 1,
                        "content": [{"type": "paragraph", "content": [{"type": "text", "text": full_description}]}]
                    },
                    "issuetype": {"name": "Task"}
                }
            }
            res = requests.post(f"{jira_url}/rest/api/3/issue", json=payload, auth=HTTPBasicAuth(user, token))
            if res.status_code == 201:
                send_slack_message(cve_id, pkg, v.get('Severity'), img)

        try:
            target_image = os.getenv("TARGET_IMAGE")
            print(f"Starte Scan für: {target_image}")
            cmd = ["/usr/local/bin/trivy", "image", "--severity", "HIGH,CRITICAL", "--format", "json", target_image]
            result = subprocess.run(cmd, capture_output=True, text=True)
            
            report = json.loads(result.stdout)
            if "Results" in report:
                for r in report["Results"]:
                    if "Vulnerabilities" in r:
                        for v in r["Vulnerabilities"]:
                            create_jira_issue(v, target_image)
            print(f"Scan für {target_image} abgeschlossen.")
        except Exception as e:
            print(f"Fehler: {e}")