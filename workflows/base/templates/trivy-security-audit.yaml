apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: trivy-security-scanner
spec:
  entrypoint: security-scan-pipeline # 
  templates:
  # 1. scan pipeline template (Hauptpipeline, die die Liste der zu scannenden Images verwaltet)
  - name: security-scan-pipeline
    steps:
    - - name: scan-selected-images
        template: scan-image
        arguments:
          parameters:
          - name: target_image
            value: "{{item}}"
        withItems:
          - "docker.io/bitnamilegacy/keycloak:26"
          - "docker.io/bitnamilegacy/postgresql:16"
          - "nginx:1.30.0"
          - "quay.io/argoproj/argocd:v3.3.8"

  # 2. scan-image template (führt den eigentlichen Trivy-Scan durch und erstellt bei Bedarf Jira-Tickets und Slack-Benachrichtigungen)
  - name: scan-image
    inputs: # Eingabeparameter für das zu scannende Image
      parameters:
      - name: target_image
    activeDeadlineSeconds: 2400 # 30 Minuten Zeitlimit pro Scan
    script:
      image: trivy-python-scanner:0.1
      imagePullPolicy: IfNotPresent
      command: [python]
      env:
      - name: TARGET_IMAGE
        value: "{{inputs.parameters.target_image}}" # Eingabeparameter für das zu scannende Image
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: slack-creds
            key: webhook-url #key-name & secret müssen angepasst werden.
      - name: JIRA_URL
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: url
      - name: JIRA_USER
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: user
      - name: JIRA_TOKEN
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: token
      - name: JIRA_PROJECT
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: project
      source: |
        import subprocess, sys, os, json
        import requests
        from requests.auth import HTTPBasicAuth

        def send_slack_message(cve_id, pkg, severity, installed_version, fixed_version, title):
            slack_url = os.getenv("SLACK_WEBHOOK_URL")
            if not slack_url:
                return

            msg = (
                f"ID: {cve_id} ({severity})\n"
                f"Paket: {pkg} (Installiert: {installed_version})\n"
                f"Fix-Version: {fixed_version}\n"
                f"Titel: {title}"
            )

            requests.post(slack_url, json={"text": msg})

        def jira_issue_exists(cve_id, img):
            jira_url = os.getenv("JIRA_URL").strip().rstrip('/')
            user = os.getenv("JIRA_USER")
            token = os.getenv("JIRA_TOKEN")
            project_key = os.getenv("JIRA_PROJECT")

            
            search_url = f"{jira_url}/rest/api/3/search/jql"
            
            
            jql = f'project = "{project_key}" AND summary ~ "{cve_id}" AND summary ~ "{img}"'
            
            payload = {
                "jql": jql,
                "maxResults": 5,
                "fields": ["summary"]
            }

            try:
                
                res = requests.post(
                    search_url,
                    json=payload,
                    auth=HTTPBasicAuth(user, token),
                    headers={"Accept": "application/json"},
                    timeout=30
                )

                if res.status_code != 200:
                    
                    print(f"Jira API Fehler: {res.status_code} - URL: {search_url}")
                    return True 

                data = res.json()
                issues = data.get("issues", [])
                
                for issue in issues:
                    summary = issue.get("fields", {}).get("summary", "")
                    if cve_id in summary and img in summary:
                        return True
                
                return False
            except Exception as e:
                print(f"Verbindungsfehler: {e}")
                return True

        def create_jira_issue(v, img):
            jira_url, user, token, project_key = os.getenv("JIRA_URL"), os.getenv("JIRA_USER"), os.getenv("JIRA_TOKEN"), os.getenv("JIRA_PROJECT")

            cve_id = v.get('VulnerabilityID', 'Unknown')
            pkg = v.get('PkgName', 'Unknown')
            severity = v.get('Severity', 'N/A')
            installed_version = v.get('InstalledVersion', 'N/A')
            fixed_version = v.get('FixedVersion', 'N/A')
            title = v.get('Title', 'Keine Beschreibung')

            if jira_issue_exists(cve_id, img):
                print(f"Ticket existiert bereits: {cve_id} für {img}. Überspringe.")
                return
            
            full_description = (
                f"DETAILS ZUR SCHWACHSTELLE\n"
                f"Image: {img}\n"
                f"ID: {cve_id}\n"
                f"Paket: {pkg} (Installiert: {installed_version})\n"
                f"Schweregrad: {v.get('Severity', 'N/A')}\n"
                f"Fix: {v.get('FixedVersion', 'N/A')}\n\n"
                f"BESCHREIBUNG\n{v.get('Description', 'Keine Details')}"
            )
            
            payload = {
                "fields": {
                    "project": {"key": project_key},
                    "summary": f"[{severity}] {img} - {cve_id}",
                    "description": {
                        "type": "doc", "version": 1,
                        "content": [{"type": "paragraph", "content": [{"type": "text", "text": full_description}]}]
                    },
                    "issuetype": {"name": "Task"}
                }
            }
            res = requests.post(f"{jira_url}/rest/api/3/issue", json=payload, auth=HTTPBasicAuth(user, token))
            if res.status_code == 201:
                print(f"Erfolg: Ticket für {cve_id} erstellt.")
                send_slack_message(cve_id, pkg, severity, installed_version, fixed_version, title)
            else:
                print(f"Jira Fehler: {res.status_code}")
                print(res.text)

        try:
            target_image = os.getenv("TARGET_IMAGE")
            print(f"Starte Scan für: {target_image}")
            print("Bereinige Trivy-Cache...")
            subprocess.run(["/usr/local/bin/trivy", "clean", "--scan-cache"], capture_output=True)
            cmd = [
                "/usr/local/bin/trivy", 
                "image", 
                "--severity", "CRITICAL", 
                "--scanners", "vuln", 
                "--timeout", "30m", 
                "--format", "json", 
                target_image
            ]
            result = subprocess.run(cmd, capture_output=True, text=True)

            if result.returncode != 0:
                print("Trivy Scan Fehler")
                print("STDOUT:")
                print(result.stdout)
                print("STDERR:")
                print(result.stderr)
                sys.exit(1)

            if not result.stdout.strip():
                print("Trivy hat keine Ausgabe geliefert.")
                print("STDERR:")
                print(result.stderr)
                sys.exit(1)

            report = json.loads(result.stdout)
            if "Results" in report:
                for r in report["Results"]:
                    if "Vulnerabilities" in r:
                        for v in r["Vulnerabilities"]:
                            if v.get("Severity") != "CRITICAL":
                                continue
                            create_jira_issue(v, target_image)
            print(f"Scan für {target_image} abgeschlossen.")
        except Exception as e:
            print(f"Unerwarteter Fehler: {e}")