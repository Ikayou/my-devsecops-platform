apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: trivy-security-scanner
spec:
  templates:
  - name: scan-image
    script:
      image: python:3.9-slim
      command: [python]
      env:
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: slack-creds
            key: webhook-url
      source: |
        import subprocess
        import sys
        import os
        import json

        # Initialisierung der Umgebung
        print("Initialisierung der Umgebung...")
        subprocess.check_call(["apt-get", "update", "-y"])
        subprocess.check_call(["apt-get", "install", "-y", "curl"])
        subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "-q"])
        
        # Installation von Trivy via offiziellem Skript
        print("Installation von Trivy...")
        subprocess.check_call(["sh", "-c", "curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin"])

        import requests

        def send_slack_message(webhook_url, message):
            payload = {"text": message}
            requests.post(webhook_url, json=payload)

        try:
            target_image = "quay.io/keycloak/keycloak:latest"
            print(f"Start des detaillierten Scans fuer: {target_image}")
            
            # Ausfuehrung des Scans
            cmd = ["/usr/local/bin/trivy", "image", "--severity", "HIGH,CRITICAL", "--format", "json", target_image]
            result = subprocess.run(cmd, capture_output=True, text=True)
            
            if result.returncode != 0:
                print(f"Trivy-Fehler: {result.stderr}")
                sys.exit(1)

            report = json.loads(result.stdout)
            detailed_vulns = []
            
            # Analyse aller Ergebnisse und Extraktion detaillierter Informationen
            if "Results" in report:
                for res in report["Results"]:
                    if "Vulnerabilities" in res:
                        for v in res["Vulnerabilities"]:
                            # Erstellung eines detaillierten Textblocks pro Schwachstelle
                            v_id = v.get('VulnerabilityID', 'N/A')
                            severity = v.get('Severity', 'N/A')
                            pkg = v.get('PkgName', 'N/A')
                            installed = v.get('InstalledVersion', 'N/A')
                            fixed = v.get('FixedVersion', 'Diskussion erforderlich')
                            title = v.get('Title', 'Keine Beschreibung verfuegbar')
                            
                            info = (
                                f"*ID:* {v_id} ({severity})\n"
                                f"*Paket:* {pkg} (Installiert: {installed})\n"
                                f"*Fix-Version:* {fixed}\n"
                                f"*Titel:* {title}\n"
                                f"---"
                            )
                            detailed_vulns.append(info)

            webhook_url = os.getenv("SLACK_WEBHOOK_URL")
            if detailed_vulns:
                count = len(detailed_vulns)
                # Zusammenfügen aller Funde zu einem langen Text
                full_report = "\n".join(detailed_vulns)
                alert_msg = (
                    f"Detaillierter Trivy Sicherheitsbericht\n"
                    f"Image: {target_image}\n"
                    f"Anzahl der kritischen Funde: {count}\n\n"
                    f"{full_report}"
                )
                
                # Bei sehr vielen Funden koennte die Nachricht die Slack-Grenze ueberschreiten.
                # Hier senden wir den kompletten Bericht.
                send_slack_message(webhook_url, alert_msg)
                print(f"Detaillierter Bericht mit {count} Funden an Slack gesendet.")
            else:
                send_slack_message(webhook_url, f"Trivy Audit abgeschlossen: Keine kritischen Schwachstellen in {target_image} gefunden.")
                print("Keine kritischen Schwachstellen gefunden.")

        except Exception as e:
            print(f"Fehler: {e}")