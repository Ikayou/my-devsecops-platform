apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: trivy-security-scanner
spec:
  templates:
  - name: scan-image
    script:
      image: python:3.9-slim
      command: [python]
      env:
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: slack-creds
            key: webhook-url
      - name: JIRA_URL
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: url
      - name: JIRA_USER
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: user
      - name: JIRA_TOKEN
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: token
      - name: JIRA_PROJECT
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: project
      source: |
        import subprocess
        import sys
        import os
        import json
        import urllib.request
        import tarfile

        print("--- Vorbereitung beginnt ---")
        
        # 1. Trivy manuell mit Python herunterladen und installieren
        def install_trivy():
            trivy_path = "/usr/local/bin/trivy"
            if not os.path.exists(trivy_path):
                print("Trivy nicht gefunden. Installation läuft...")
                # Download URL für ARM64 (Ihre Umgebung laut Log)
                url = "https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-ARM64.tar.gz"
                tar_path = "/tmp/trivy.tar.gz"
                
                # Herunterladen
                urllib.request.urlretrieve(url, tar_path)
                
                # Entpacken
                with tarfile.open(tar_path, "r:gz") as tar:
                    tar.extract("trivy", path="/usr/local/bin")
                
                # Ausführbar machen
                os.chmod(trivy_path, 0o755)
                print("Trivy erfolgreich installiert.")
            else:
                print("Trivy ist bereits installiert.")

        try:
            install_trivy()
            # requests installieren
            subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "-q"])
        except Exception as e:
            print(f"Fehler bei der Vorbereitung: {e}")
            sys.exit(1)

        import requests
        from requests.auth import HTTPBasicAuth

        def create_jira_issue(cve_id, severity, pkg, fixed_version, title):
            jira_url = os.getenv("JIRA_URL")
            user = os.getenv("JIRA_USER")
            token = os.getenv("JIRA_TOKEN")
            project_key = os.getenv("JIRA_PROJECT")

            print(f"Versuche Jira-Ticket zu erstellen: {cve_id} (Projekt: {project_key})")

            endpoint = f"{jira_url}/rest/api/3/issue"
            auth = HTTPBasicAuth(user, token)
            
            # Beschreibung des Tickets auf Deutsch
            description_text = (
                f"Trivy Scan Fund: {pkg}\n"
                f"Schweregrad: {severity}\n"
                f"Verfügbarer Fix: {fixed_version}\n"
                f"Beschreibung: {title}"
            )
            
            payload = {
                "fields": {
                    "project": {"key": project_key},
                    "summary": f"Sicherheit: {cve_id} in {pkg} gefunden",
                    "description": {
                        "type": "doc", "version": 1,
                        "content": [{
                            "type": "paragraph", 
                            "content": [{"type": "text", "text": description_text}]
                        }]
                    },
                    "issuetype": {"name": "Bug"}
                }
            }
            
            res = requests.post(endpoint, json=payload, auth=auth)
            print(f"Jira API Antwort-Status: {res.status_code}")
            if res.status_code != 201:
                print(f"Jira Fehler-Details: {res.text}")
            else:
                print(f"Erfolg: Ticket für {cve_id} wurde erstellt.")

        # --- Hauptprozess ---
        try:
            # Test-Image mit bekannten Schwachstellen
            target_image = "alpine:3.7" 
            print(f"Starte Sicherheits-Scan für: {target_image}")
            
            cmd = ["/usr/local/bin/trivy", "image", "--severity", "HIGH,CRITICAL", "--format", "json", target_image]
            result = subprocess.run(cmd, capture_output=True, text=True)
            
            if result.returncode != 0:
                print(f"Trivy-Fehler: {result.stderr}")
                sys.exit(1)

            report = json.loads(result.stdout)
            vulns_found = 0

            if "Results" in report:
                for res in report["Results"]:
                    if "Vulnerabilities" in res:
                        vulns = res["Vulnerabilities"]
                        vulns_found = len(vulns)
                        print(f"{vulns_found} Schwachstellen gefunden.")
                        
                        # Erstelle Tickets für die ersten 3 Funde (Testlauf)
                        for v in vulns[:3]:
                            create_jira_issue(
                                v.get('VulnerabilityID'),
                                v.get('Severity'),
                                v.get('PkgName'),
                                v.get('FixedVersion', 'N/A'),
                                v.get('Title', 'Keine Beschreibung verfügbar')
                            )
            
            if vulns_found == 0:
                print("Keine HIGH oder CRITICAL Schwachstellen gefunden.")

        except Exception as e:
            print(f"Unerwarteter Fehler: {e}")