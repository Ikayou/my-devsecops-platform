apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: trivy-security-scanner
spec:
  templates:
  - name: scan-image
    script:
      image: python:3.9-slim
      command: [python]
      env:
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: slack-creds
            key: webhook-url
      source: |
        import subprocess
        import sys
        import os
        import json
        import requests

        # Trivy & Requests Bibliotheken installieren
        print("Installing Trivy and dependencies...")
        subprocess.check_call(["apt-get", "update", "-y"])
        subprocess.check_call(["apt-get", "install", "wget", "gnupg", "lsb-release", "-y"])
        # Trivy GPG-Schlüssel und Repository hinzufügen
        subprocess.check_call(["sh", "-c", "wget -qO - https://aquasecurity.github.io/trivy-repo/dabest.gpg | apt-key add -"])
        subprocess.check_call(["sh", "-c", "echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | tee -a /etc/apt/sources.list.d/trivy.list"])
        subprocess.check_call(["apt-get", "update", "-y"])
        subprocess.check_call(["apt-get", "install", "trivy", "-y"])

        def send_slack(message):
            webhook_url = os.getenv("SLACK_WEBHOOK_URL")
            requests.post(webhook_url, json={"text": message})

        try:
            target_image = "quay.io/keycloak/keycloak:latest"
            print(f"--- Scanning Image: {target_image} ---")
            
            # HIGH & CRITICAL Schwachstellen scannen
            cmd = ["trivy", "image", "--severity", "HIGH,CRITICAL", "--format", "json", target_image]
            result = subprocess.run(cmd, capture_output=True, text=True)
            
            report = json.loads(result.stdout)
            vulns_found = []
            
            if "Results" in report:
                for res in report["Results"]:
                    if "Vulnerabilities" in res:
                        for v in res["Vulnerabilities"]:
                            vulns_found.append(f"ID: {v['VulnerabilityID']} ({v['Severity']}) - {v['PkgName']}")

            if vulns_found:
                count = len(vulns_found)
                # Nur die ersten 5 Schwachstellen in der Nachricht anzeigen
                details = "\n".join(vulns_found[:5])
                msg = f" *Trivy Security Alert*\nImage: `{target_image}`\n{count} kritische Schwachstellen gefunden.\n\n*Top 5:* \n{details}"
                send_slack(msg)
                print(f"Alarm gesendet: {count} Schwachstellen gefunden.")
            else:
                print("Keine kritischen Schwachstellen gefunden. Keine Aktion erforderlich.")

        except Exception as e:
            print(f"Fehler beim Scan: {e}")