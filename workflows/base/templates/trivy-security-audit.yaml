apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: trivy-security-scanner
spec:
  templates:
  - name: scan-image
    script:
      image: python:3.9-slim
      command: [python]
      env:
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: slack-creds
            key: webhook-url
      source: |
        import subprocess
        import sys
        import os
        import json

        # Initialisierung der Umgebung
        print("Initialisierung der Umgebung...")
        
        # Installation von Python-Requests und tar/curl
        subprocess.check_call(["apt-get", "update", "-y"])
        subprocess.check_call(["apt-get", "install", "-y", "curl", "tar"])
        subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "-q"])
        
        # Direkte Installation der Trivy-Binary (stabilste Methode fuer Container)
        print("Installation von Trivy via Binary...")
        TRIVY_VERSION = "0.48.3" # Aktuelle stabile Version
        download_url = f"https://github.com/aquasecurity/trivy/releases/download/v{TRIVY_VERSION}/trivy_{TRIVY_VERSION}_Linux-64bit.tar.gz"
        
        subprocess.check_call(["curl", "-sfL", download_url, "-o", "trivy.tar.gz"])
        subprocess.check_call(["tar", "-xzf", "trivy.tar.gz", "trivy"])
        subprocess.check_call(["mv", "trivy", "/usr/local/bin/trivy"])
        subprocess.check_call(["chmod", "+x", "/usr/local/bin/trivy"])

        # Import der Requests-Bibliothek
        import requests

        def send_slack_message(webhook_url, message):
            payload = {"text": message}
            requests.post(webhook_url, json=payload)

        try:
            target_image = "quay.io/keycloak/keycloak:latest"
            print(f"Start des Scans fuer Image: {target_image}")
            
            # Ausfuehrung von Trivy-Scan (HIGH und CRITICAL)
            cmd = ["/usr/local/bin/trivy", "image", "--severity", "HIGH,CRITICAL", "--format", "json", target_image]
            result = subprocess.run(cmd, capture_output=True, text=True)
            
            if result.returncode != 0:
                print(f"Trivy-Fehler: {result.stderr}")
                sys.exit(1)

            report = json.loads(result.stdout)
            vulns_found = []
            
            if "Results" in report:
                for res in report["Results"]:
                    if "Vulnerabilities" in res:
                        for v in res["Vulnerabilities"]:
                            vulns_found.append(f"ID: {v['VulnerabilityID']} ({v['Severity']}) - {v['PkgName']}")

            webhook_url = os.getenv("SLACK_WEBHOOK_URL")
            if vulns_found:
                count = len(vulns_found)
                details = "\n".join(vulns_found[:5])
                alert_msg = (
                    f"Trivy Sicherheitswarnung\n"
                    f"Image: {target_image}\n"
                    f"{count} kritische Schwachstellen gefunden.\n\n"
                    f"Top 5 Funde:\n{details}"
                )
                send_slack_message(webhook_url, alert_msg)
                print(f"Warnung gesendet: {count} Schwachstellen identifiziert.")
            else:
                send_slack_message(webhook_url, f"Trivy Audit abgeschlossen: Keine kritischen Schwachstellen in {target_image} gefunden.")
                print("Keine kritischen Schwachstellen gefunden.")

        except Exception as e:
            print(f"Ein Fehler ist waehrend des Scans aufgetreten: {e}")