apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: trivy-security-scanner
spec:
  templates:
  - name: scan-image
    script:
      image: python:3.9-slim
      command: [python]
      env:
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: slack-creds
            key: webhook-url
      - name: JIRA_URL
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: url
      - name: JIRA_USER
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: user
      - name: JIRA_TOKEN
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: token
      - name: JIRA_PROJECT
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: project
      source: |
        import subprocess
        import sys
        import os
        import json
        import requests
        from requests.auth import HTTPBasicAuth

        # Initialisierung der Umgebung
        print("Initialisierung der Umgebung...")
        subprocess.check_call(["apt-get", "update", "-y"])
        subprocess.check_call(["apt-get", "install", "-y", "curl"])
        subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "-q"])
        
        # Installation von Trivy
        subprocess.check_call(["sh", "-c", "curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin"])

        def create_jira_issue(cve_id, severity, pkg, fixed_version, title):
            jira_url = os.getenv("JIRA_URL")
            user = os.getenv("JIRA_USER")
            token = os.getenv("JIRA_TOKEN")
            project_key = os.getenv("JIRA_PROJECT")

            if not all([jira_url, user, token, project_key]):
                print("Jira-Konfiguration unvollstaendig.")
                return

            endpoint = f"{jira_url}/rest/api/3/issue"
            auth = HTTPBasicAuth(user, token)
            
            description_text = (
                f"Trivy Scan Fund:\n\n"
                f"Paket: {pkg}\n"
                f"Schweregrad: {severity}\n"
                f"Fix verfügbar: {fixed_version}\n"
                f"Details: {title}"
            )

            payload = {
                "fields": {
                    "project": {"key": project_key},
                    "summary": f"Sicherheit: {cve_id} in {pkg}",
                    "description": {
                        "type": "doc", "version": 1,
                        "content": [{"type": "paragraph", "content": [{"type": "text", "text": description_text}]}]
                    },
                    "issuetype": {"name": "Bug"}
                }
            }
            requests.post(endpoint, json=payload, auth=auth)

        try:
            target_image = "quay.io/keycloak/keycloak:latest"
            cmd = ["/usr/local/bin/trivy", "image", "--severity", "HIGH,CRITICAL", "--format", "json", target_image]
            result = subprocess.run(cmd, capture_output=True, text=True)
            
            report = json.loads(result.stdout)
            detailed_vulns = []
            
            if "Results" in report:
                for res in report["Results"]:
                    if "Vulnerabilities" in res:
                        for v in res["Vulnerabilities"]:
                            v_id = v.get('VulnerabilityID')
                            sev = v.get('Severity')
                            pkg = v.get('PkgName')
                            fix = v.get('FixedVersion', 'Diskussion erforderlich')
                            ttl = v.get('Title', 'Keine Beschreibung')
                            
                            # Slack-Benachrichtigung vorbereiten
                            detailed_vulns.append(f"ID: {v_id} ({sev})\nPaket: {pkg}\n---")
                            
                            # Jira-Ticket erstellen
                            create_jira_issue(v_id, sev, pkg, fix, ttl)

            # Slack-Benachrichtigung mit den gefundenen Schwachstellen
            webhook_url = os.getenv("SLACK_WEBHOOK_URL")
            if detailed_vulns:
                msg = f"Trivy Bericht: {len(detailed_vulns)} Funde. Tickets wurden in Jira erstellt.\n\n" + "\n".join(detailed_vulns[:10])
                requests.post(webhook_url, json={"text": msg})

        except Exception as e:
            print(f"Fehler: {e}")