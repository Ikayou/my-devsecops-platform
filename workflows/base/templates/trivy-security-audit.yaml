apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: trivy-security-scanner
spec:
  templates:
  - name: scan-image
    script:
      image: python:3.9-slim
      command: [python]
      env:
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: slack-creds
            key: webhook-url
      - name: JIRA_URL
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: url
      - name: JIRA_USER
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: user
      - name: JIRA_TOKEN
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: token
      - name: JIRA_PROJECT
        valueFrom:
          secretKeyRef:
            name: jira-creds
            key: project
      source: |
        import subprocess
        import sys
        import os
        import json
        import urllib.request
        import tarfile

        print("--- Vorbereitung beginnt ---")
        
        def install_trivy():
            trivy_path = "/usr/local/bin/trivy"
            if not os.path.exists(trivy_path):
                print("Installiere Trivy...")
                url = "https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-ARM64.tar.gz"
                urllib.request.urlretrieve(url, "/tmp/trivy.tar.gz")
                with tarfile.open("/tmp/trivy.tar.gz", "r:gz") as tar:
                    tar.extract("trivy", path="/usr/local/bin")
                os.chmod(trivy_path, 0o755)
                print("Trivy erfolgreich installiert.")

        try:
            install_trivy()
            subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "-q"])
        except Exception as e:
            print(f"Fehler bei der Vorbereitung: {e}")
            sys.exit(1)

        import requests
        from requests.auth import HTTPBasicAuth

        def send_slack_message(text):
            slack_url = os.getenv("SLACK_URL")
            if not slack_url:
                return
            payload = {"text": text}
            requests.post(slack_url, json=payload)

        def create_jira_issue(v):
            jira_url = os.getenv("JIRA_URL")
            user = os.getenv("JIRA_USER")
            token = os.getenv("JIRA_TOKEN")
            project_key = os.getenv("JIRA_PROJECT")
            
            cve_id = v.get('VulnerabilityID')
            pkg = v.get('PkgName')
            
            endpoint = f"{jira_url}/rest/api/3/issue"
            auth = HTTPBasicAuth(user, token)
            
            desc = f"Trivy Scan Fund: {pkg}\nSchweregrad: {v.get('Severity')}\nFix: {v.get('FixedVersion', 'N/A')}"
            payload = {
                "fields": {
                    "project": {"key": project_key},
                    "summary": f"Sicherheit: {cve_id} in {pkg} gefunden",
                    "description": {
                        "type": "doc", "version": 1,
                        "content": [{"type": "paragraph", "content": [{"type": "text", "text": desc}]}]
                    },
                    "issuetype": {"name": "Task"} # Bug oder Task je nach Bedarf anpassen
                }
            }
            
            res = requests.post(endpoint, json=payload, auth=auth)
            if res.status_code == 201:
                print(f"Erfolg: Ticket für {cve_id} erstellt.")
                send_slack_message(f" Jira Ticket erstellt: {cve_id} in {pkg} (Projekt: {project_key})")
            else:
                print(f"Jira Fehler ({res.status_code}): {res.text}")

        try:
            target_image = "alpine:3.7"
            print(f"Starte Scan für: {target_image}")
            cmd = ["/usr/local/bin/trivy", "image", "--severity", "HIGH,CRITICAL", "--format", "json", target_image]
            result = subprocess.run(cmd, capture_output=True, text=True)
            
            report = json.loads(result.stdout)
            if "Results" in report:
                for r in report["Results"]:
                    if "Vulnerabilities" in r:
                        print(f"{len(r['Vulnerabilities'])} Schwachstellen gefunden.")
                        for v in r["Vulnerabilities"][:10]:  # Nur die Top 10 anzeigen
                            create_jira_issue(v)
        except Exception as e:
            print(f"Unerwarteter Fehler: {e}")