apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: keycloak-audit-templates
spec:
  entrypoint: user-scan
  templates:
  - name: user-scan
    inputs:
      parameters:
      - name: keycloak-url
        value: "http://keycloak.keycloak.svc.cluster.local:80" 
      - name: realm
        value: "master"
    script:
      image: python:3.9-slim
      command: [python]
      env:
      - name: ADMIN_USER
        valueFrom:
          secretKeyRef:
            name: keycloak-creds
            key: username
      - name: ADMIN_PASS
        valueFrom:
          secretKeyRef:
            name: keycloak-creds
            key: password
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: slack-creds
            key: webhook-url
      source: |
        import subprocess
        import sys
        import os
        import json

        # Benötigte Bibliotheken installieren
        subprocess.check_call([sys.executable, "-m", "pip", "install", "python-keycloak", "requests", "-q"])

        from keycloak import KeycloakAdmin
        import requests

        def send_slack_message(webhook_url, message):
            payload = {"text": message}
            requests.post(webhook_url, json=payload)

        try:
            print("--- Audit-Start ---")
            admin = KeycloakAdmin(
                server_url="{{inputs.parameters.keycloak-url}}",
                username=os.getenv("ADMIN_USER"),
                password=os.getenv("ADMIN_PASS"),
                realm_name="{{inputs.parameters.realm}}",
                verify=False
            )

            users = admin.get_users({})
            unsafe_users = []
            
            for user in users:
                user_detail = admin.get_user(user['id'])
                has_otp = user_detail.get('totp', False)
                creds_types = user_detail.get('disableableCredentialTypes', [])
                has_mfa = has_otp or any('otp' in t.lower() for t in creds_types)
                
                if not has_mfa:
                    unsafe_users.append(user['username'])

            # Slack-Benachrichtigung vorbereiten
            webhook_url = os.getenv("SLACK_WEBHOOK_URL")
            if unsafe_users:
                alert_text = f" *Sicherheitswarnung*\nFolgende Benutzer haben kein MFA aktiviert: {', '.join(unsafe_users)}"
                send_slack_message(webhook_url, alert_text)
                print(f"Warnung an Slack gesendet: {', '.join(unsafe_users)}")
            else:
                send_slack_message(webhook_url, " Audit abgeschlossen: Alle Benutzer haben MFA aktiviert.")
                print("Erfolgsmeldung an Slack gesendet.")

        except Exception as e:
            print(f"Ein Fehler ist aufgetreten: {e}")