apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: keycloak-audit-templates
spec:
  entrypoint: user-scan
  templates:
  - name: user-scan
    inputs:
      parameters:
      - name: keycloak-url
        value: "http://keycloak.apps.svc.cluster.local:8080" 
      - name: realm
        value: "master"
    script:
      image: python:3.9-slim
      command: [python]
      env:
      - name: ADMIN_USER
        valueFrom:
          secretKeyRef:
            name: keycloak-creds
            key: username
      - name: ADMIN_PASS
        valueFrom:
          secretKeyRef:
            name: keycloak-creds
            key: password
      source: |
        import subprocess
        import sys
        import os

        # python-keycloak installieren
        subprocess.check_call([sys.executable, "-m", "pip", "install", "python-keycloak", "-q"])

        from keycloak import KeycloakAdmin

        try:
            print("--- Audit Start ---")
            admin = KeycloakAdmin(
                server_url="{{inputs.parameters.keycloak-url}}",
                username=os.getenv("ADMIN_USER"),
                password=os.getenv("ADMIN_PASS"),
                realm_name="{{inputs.parameters.realm}}",
                verify=False
            )

            users = admin.get_users({})
            print(f"Total {len(users)} users checked.")
            for user in users:
                print(f"User: {user['username']}")

        except Exception as e:
            print(f"Error occurred: {e}")