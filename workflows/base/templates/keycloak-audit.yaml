apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: keycloak-audit-templates
spec:
  entrypoint: user-scan
  templates:
  - name: user-scan
    inputs:
      parameters:
      - name: keycloak-url
        value: "http://keycloak.keycloak.svc.cluster.local:80" 
      - name: realm
        value: "master"
    script:
      image: python:3.9-slim
      command: [python]
      env:
      - name: ADMIN_USER
        valueFrom:
          secretKeyRef:
            name: keycloak-creds
            key: username
      - name: ADMIN_PASS
        valueFrom:
          secretKeyRef:
            name: keycloak-creds
            key: password
      source: |
        import subprocess
        import sys
        import os

        # Installation der benötigten Bibliothek python-keycloak
        subprocess.check_call([sys.executable, "-m", "pip", "install", "python-keycloak", "-q"])

        from keycloak import KeycloakAdmin

        try:
            print("--- Audit-Start ---")
            # Initialisierung des Keycloak-Admin-Clients
            admin = KeycloakAdmin(
                server_url="{{inputs.parameters.keycloak-url}}",
                username=os.getenv("ADMIN_USER"),
                password=os.getenv("ADMIN_PASS"),
                realm_name="{{inputs.parameters.realm}}",
                verify=False
            )

            # Abrufen aller Benutzer aus dem angegebenen Realm
            users = admin.get_users({})
            print(f"--- Audit-Bericht wird erstellt ---")
            
            unsafe_users = []
            for user in users:
                # Abrufen detaillierter Benutzerinformationen für die MFA-Prüfung
                user_detail = admin.get_user(user['id'])
                
                # Prüfung, ob MFA (Multi-Faktor-Authentifizierung) aktiviert ist
                has_otp = user_detail.get('totp', False)
                creds_types = user_detail.get('disableableCredentialTypes', [])
                has_mfa = has_otp or any('otp' in t.lower() for t in creds_types)
                
                status = " MFA aktiviert" if has_mfa else " MFA nicht konfiguriert"
                print(f"Benutzer: {user['username']} - {status}")
                
                if not has_mfa:
                    unsafe_users.append(user['username'])

            # Zusammenfassende Warnung, falls Benutzer ohne MFA gefunden wurden
            if unsafe_users:
                print(f"\n Warnung: Schwache Sicherheitseinstellungen (kein MFA): {', '.join(unsafe_users)}")
            else:
                print("\n Alle Benutzer haben MFA aktiviert.")

        except Exception as e:
            print(f"Ein Fehler ist aufgetreten: {e}")